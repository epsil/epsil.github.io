<h1 class="p-name"><a class="u-uid u-url" href="https://epsil.github.io/blog/2013/12/06/" rel="bookmark" target="_blank" title="Permalink">Fikse <code>mkfs.ntfs</code> p&#229; Ubuntu</a>
</h1>

<p class="author"><a class="p-author h-card" href="https://epsil.github.io/" target="_blank" title="Open epsil.github.io in a new window">Vegard &#216;ye</a> &#8226; <time class="dt-published" datetime="2013-12-06">2013-12-06</time></p>
</header>

<section class="e-content">
<section>
<p>I Ubuntu 13.04 er <code>mkfs.ntfs</code> utilgjengelig (<code>mkntfs</code> fungerer). Dette skyldes en <a href="https://bugs.launchpad.net/ubuntu/+source/ntfs-3g/+bug/1148541" target="_blank" title="Open bugs.launchpad.net in a new window">manglende symlink</a> fra <code>/sbin/mkfs.ntfs</code> til <code>/sbin/mkntfs</code>. Det f&#248;lgende retter opp&#160;problemet:</p>

<pre>
<code>$ sudo unlink /sbin/mkfs.ntfs
$ sudo ln -s /sbin/mkntfs /sbin/mkfs.ntfs</code>
</pre>
</section>
